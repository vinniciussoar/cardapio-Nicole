:root {
  --bg: #1a0000;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(212,160,23,0.18);
  --dourado: #D4A017;
  --dourado-claro: #f5c842;
  --vermelho: #8B0000;
  --texto: #f5ede0;
  --texto-suave: rgba(245,237,224,0.65);
  --linha: rgba(212,160,23,0.2);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--texto);
  min-height: 100vh;
  padding-bottom: 60px;
}
body::before {
  content:'';
  position:fixed;
  top:-120px; left:50%;
  transform:translateX(-50%);
  width:600px; height:400px;
  background: radial-gradient(ellipse, rgba(180,30,30,0.35) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* HEADER */
header {
position: relative;
padding: 0 16px 0;
max-width: 520px;
margin: 0 auto;
z-index: 1;
}
.header-inner {
display: flex;
align-items: flex-end;
justify-content: space-between;
padding-top: 16px;
}
.header-text { flex:1; text-align:center; padding-bottom:12px; }
.header-eyebrow {
font-family: 'Cinzel', serif;
font-size: 10px;
letter-spacing: 4px;
color: var(--dourado);
text-transform: uppercase;
margin-bottom: 2px;
}
.header-logo {
font-family: 'Cinzel Decorative', serif;
font-size: 42px;
font-weight: 900;
color: #fff;
line-height: 1;
text-shadow: 0 0 40px rgba(212,160,23,0.4);
}
.header-logo span { color: var(--dourado-claro); }
.header-cacule {
font-family: 'Cinzel', serif;
font-size: 13px;
letter-spacing: 6px;
color: var(--dourado);
text-transform: uppercase;
margin-top: 2px;
}
.header-badge {
width:56px; height:56px;
border:2px solid var(--dourado);
border-radius:50%;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
flex-shrink:0; margin-bottom:14px;
}
.header-badge .badge-num { font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--dourado-claro); line-height:1; }
.header-badge .badge-txt { font-size:8px; color:var(--dourado); letter-spacing:1px; text-align:center; line-height:1.3; }
.boneca-wrap { width:90px; flex-shrink:0; display:flex; align-items:flex-end; margin-bottom:-4px; }
.boneca-wrap img { width:100%; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }

.gold-divider {
height:2px;
background:linear-gradient(90deg,transparent,var(--dourado),transparent);
max-width:520px; margin:0 auto;
}

/* AVISOS */
.avisos-wrap { max-width:520px; margin:12px auto 0; padding:0 16px; display:flex; flex-direction:column; gap:8px; }
.aviso-box { border-radius:10px; padding:10px 14px; font-size:11.5px; text-align:center; line-height:1.6; }
.aviso-pizza { background:rgba(212,160,23,0.08); border:1px solid rgba(212,160,23,0.25); color:var(--dourado-claro); }
.aviso-beirute { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:var(--texto-suave); }
.aviso-tubaina { background:rgba(34,120,34,0.12); border:1px solid rgba(100,220,100,0.3); color:#7dde7d; }

/* SEARCH */
.search-wrap { max-width:520px; margin:14px auto 0; padding:0 16px; }
.search-inner { position:relative; }
.search-inner input {
width:100%;
background:rgba(255,255,255,0.06);
border:1px solid rgba(212,160,23,0.3);
border-radius:50px;
padding:11px 44px 11px 18px;
font-size:13px; font-family:'Lato',sans-serif;
color:var(--texto); outline:none; transition:border-color .2s;
}
.search-inner input::placeholder { color:rgba(245,237,224,0.35); }
.search-inner input:focus { border-color:var(--dourado); }
.search-inner i { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--dourado); font-size:14px; }

/* TABS */
nav#cats {
display:flex; overflow-x:auto; gap:8px;
padding:14px 16px; max-width:520px; margin:0 auto;
scrollbar-width:none;
}
nav#cats::-webkit-scrollbar { display:none; }
nav#cats button {
white-space:nowrap; background:transparent;
border:1px solid rgba(212,160,23,0.3); border-radius:50px;
padding:7px 16px; font-family:'Lato',sans-serif;
font-size:12px; font-weight:700; color:var(--dourado);
cursor:pointer; letter-spacing:0.5px; transition:all .2s;
}
nav#cats button.active, nav#cats button:hover {
background:var(--dourado); border-color:var(--dourado); color:#1a0000;
}

/* PROMO PIZZA */

position:relative; overflow:hidden;
}
